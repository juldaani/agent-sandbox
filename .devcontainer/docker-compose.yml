# Agent sandbox docker-compose stack — devcontainer + AivoCode REST API server.
#
# /workspaces is a shared named volume — any new subdirectories created
# in one container are immediately visible in the other.
# The agent-sandbox repo is bind-mounted at /workspaces/agent-sandbox in both.
#
# Usage:
#   docker compose -f .devcontainer/docker-compose.yml up -d
#   docker compose -f .devcontainer/docker-compose.yml exec sandbox bash
#   docker compose -f .devcontainer/docker-compose.yml down
#
# DevPod:
#   devpod up . --ide none --provider docker --workspace-env-file ./workspace.env
services:
  aivocode:
    image: ghcr.io/juldaani/aivocode:latest
    ports:
      - "8000:8000"
    volumes:
      - workspaces:/workspaces
      - ..:/workspaces/agent-sandbox
    env_file:
      - ../.aivocode.env

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - aivocode
    command: sleep infinity
    volumes:
      - workspaces:/workspaces
      - ..:/workspaces/agent-sandbox
    environment:
      - AIVOCODE_URL=http://aivocode:8000

volumes:
  workspaces:
